<!DOCTYPE html>
<!-- 登录页：作为进入盐憩之前的潜前门厅，负责承接品牌氛围与登录 / 注册流程。 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盐憩 - 潜前门厅</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/page-transition.css">
    <link rel="stylesheet" href="css/depth-gauge.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page is-auth-login" data-auth-mode="login">
    <div class="page-transition-overlay" id="pageTransitionOverlay" aria-hidden="true"></div>

    <div class="depth-gauge left" aria-hidden="true">
        <div class="gauge-current" id="leftGaugeCurrent">0m</div>
        <div class="gauge-markers" id="leftGaugeMarkers"></div>
    </div>

    <div class="depth-gauge right" aria-hidden="true">
        <div class="gauge-current" id="rightGaugeCurrent">0m</div>
        <div class="gauge-markers" id="rightGaugeMarkers"></div>
    </div>

    <div class="page-stage" id="pageStage">
        <div class="bg-container" aria-hidden="true">
            <div class="gradient-bg"></div>
            <div class="login-atmosphere">
                <span class="atmosphere-wave wave-a"></span>
                <span class="atmosphere-wave wave-b"></span>
                <span class="atmosphere-wave wave-c"></span>
                <div class="salt-particles">
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                </div>
            </div>
        </div>

        <main class="login-container" aria-label="盐憩登录门厅">
            <div class="login-stage-shell" id="loginStageShell">
                <div class="login-stage-glow" aria-hidden="true"></div>
                <div class="login-stage-resize-layer" aria-hidden="true">
                    <button type="button" class="login-stage-resize-handle is-north" data-resize-direction="n" tabindex="-1" aria-hidden="true"></button>
                    <button type="button" class="login-stage-resize-handle is-east" data-resize-direction="e" tabindex="-1" aria-hidden="true"></button>
                    <button type="button" class="login-stage-resize-handle is-south" data-resize-direction="s" tabindex="-1" aria-hidden="true"></button>
                    <button type="button" class="login-stage-resize-handle is-west" data-resize-direction="w" tabindex="-1" aria-hidden="true"></button>
                    <button type="button" class="login-stage-resize-handle is-north-east" data-resize-direction="ne" tabindex="-1" aria-hidden="true"></button>
                    <button type="button" class="login-stage-resize-handle is-south-east" data-resize-direction="se" tabindex="-1" aria-hidden="true"></button>
                    <button type="button" class="login-stage-resize-handle is-south-west" data-resize-direction="sw" tabindex="-1" aria-hidden="true"></button>
                    <button type="button" class="login-stage-resize-handle is-north-west" data-resize-direction="nw" tabindex="-1" aria-hidden="true"></button>
                </div>

                <div class="glass-card">
                    <div class="card-layout">
                        <aside class="login-side fade-in-up" style="animation-delay: 0s">
                            <div class="login-brand-copy">
                                <p class="side-kicker">Arrival Layer</p>
                                <h1 class="side-title">盐憩</h1>
                                <p class="side-quote">先让呼吸慢一点。</p>
                                <p class="side-meta">海还在前面，你先安静下来。</p>
                            </div>
                        </aside>

                        <section class="form-side">
                            <div class="auth-panel-shell fade-in-up" style="animation-delay: 0.08s">
                                <div class="auth-panel-glass" aria-hidden="true"></div>
                                <div class="auth-panel-inner">
                                    <div class="form-brand fade-in-up" style="animation-delay: 0.08s">
                                        <p class="form-kicker">Entrance Console</p>

                                        <div class="form-copy form-copy-login">
                                            <h2 class="form-title">欢迎回来</h2>
                                            <p class="form-subtitle">让海面慢慢安静下来，再继续这一次下潜。你离海已经不远了，先在这里把呼吸放慢。</p>
                                        </div>

                                        <div class="form-copy form-copy-register">
                                            <h2 class="form-title">创建你的账户</h2>
                                            <p class="form-subtitle">先留下你的名字，往后的海会慢慢向你打开。把这次进入轻轻记下来，之后每一潜都会更从容。</p>
                                        </div>
                                    </div>

                                    <div class="tab-section fade-in-up" style="animation-delay: 0.14s">
                                        <div class="tabs" role="tablist" aria-label="登录方式切换">
                                            <button class="tab-btn active" data-tab="login" type="button" role="tab" aria-selected="true">登录</button>
                                            <button class="tab-btn" data-tab="register" type="button" role="tab" aria-selected="false">注册</button>
                                        </div>
                                    </div>

                                    <form class="auth-form" id="authForm" novalidate>
                                        <div class="tab-content active" id="login">
                                            <div class="input-group fade-in-up" style="animation-delay: 0.18s">
                                                <label for="login-email">进入身份</label>
                                                <input type="text" id="login-email" placeholder="邮箱或手机号，会把你带回这层静水" required>
                                            </div>

                                            <div class="input-group fade-in-up" style="animation-delay: 0.3s">
                                                <label for="login-password">通行密钥</label>
                                                <input type="password" id="login-password" placeholder="把这一层海的入口轻轻写进来" required>
                                            </div>

                                            <div class="checkbox-group fade-in-up" style="animation-delay: 0.42s">
                                                <input type="checkbox" id="remember-me">
                                                <label for="remember-me" class="checkbox-label">让这层静水记住我</label>
                                            </div>

                                            <button type="submit" class="button fade-in-up" style="animation-delay: 0.54s">
                                                <span>登录</span>
                                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                                    <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"></path>
                                                </svg>
                                            </button>
                                        </div>

                                        <div class="tab-content" id="register">
                                            <div class="input-group fade-in-up" style="animation-delay: 0.18s">
                                                <label for="register-email">邮箱</label>
                                                <input type="email" id="register-email" placeholder="先留下一处能被海找到的地址" required>
                                            </div>

                                            <div class="input-group fade-in-up" style="animation-delay: 0.3s">
                                                <label for="register-phone">手机号</label>
                                                <input type="tel" id="register-phone" placeholder="让这次进入有一个更稳的联系节奏" required>
                                            </div>

                                            <div class="input-group fade-in-up" style="animation-delay: 0.42s">
                                                <label for="register-password">设置密钥</label>
                                                <input type="password" id="register-password" placeholder="替自己留下一把进入这片海的钥匙" required>
                                            </div>

                                            <div class="input-group fade-in-up" style="animation-delay: 0.54s">
                                                <label for="register-confirm">确认密钥</label>
                                                <input type="password" id="register-confirm" placeholder="再确认一次，让这层海记住你" required>
                                            </div>

                                            <div class="checkbox-group fade-in-up" style="animation-delay: 0.66s">
                                                <input type="checkbox" id="agree-terms">
                                                <label for="agree-terms" class="checkbox-label">我已阅读并同意 <a href="terms.html" target="_blank" rel="noopener noreferrer">《用户协议》</a> 与 <a href="privacy.html" target="_blank" rel="noopener noreferrer">《隐私政策》</a></label>
                                            </div>

                                            <button type="submit" class="submit-btn fade-in-up" style="animation-delay: 0.78s">
                                                <span>注册</span>
                                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                                    <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"></path>
                                                </svg>
                                            </button>
                                        </div>
                                    </form>

                                    <div class="footer-links fade-in-up" style="animation-delay: 0.86s">
                                        <a href="#" class="link-forgot">忘记密码</a>
                                        <span class="divider">/</span>
                                        <button type="button" class="link-guest">先逛逛</button>
                                        <span class="divider">/</span>
                                        <a href="contact.html" class="link-forgot" target="_blank" rel="noopener noreferrer">联系我们</a>
                                    </div>

                                    <div class="social-login fade-in-up" style="animation-delay: 0.96s">
                                        <p class="social-text">也可以从别的入口慢慢进来</p>
                                        <div class="social-buttons">
                                            <button type="button" class="social-btn wechat" title="微信登录"><span>微信</span></button>
                                            <button type="button" class="social-btn qq" title="QQ 登录"><span>QQ</span></button>
                                            <button type="button" class="social-btn google" title="Google 登录"><span>Google</span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/depth-manager.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
